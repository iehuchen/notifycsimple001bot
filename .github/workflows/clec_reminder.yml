name: CLEC Telegram Reminder (Precise)

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'   # 每分鐘執行一次

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Debug Time
        run: |
          echo "===== TIME DEBUG ====="
          echo "UTC Time:"
          date -u
          echo "Taipei Time:"
          TZ=Asia/Taipei date
          echo "======================"

      - name: Check Time and Send Telegram
        run: |
          # 設定台灣時間
          NOW=$(TZ=Asia/Taipei date "+%H:%M")
          TODAY=$(TZ=Asia/Taipei date "+%Y-%m-%d")

          # 記錄檔（避免同分鐘重送）
          LOCK_FILE="/tmp/telegram_last_sent"

          echo "Current time: $NOW"

          # 讀取上次送出時間
          if [ -f "$LOCK_FILE" ]; then
            LAST_SENT=$(cat $LOCK_FILE)
          else
            LAST_SENT=""
          fi

          # 定義提醒時間
          case "$NOW" in
            "08:32"|"08:58"|"09:30"|"10:00"|"11:40"|"13:10"|"16:10"|"17:02"|"17:06"|"17:08")

              # 防止重複發送
              if [ "$LAST_SENT" = "$TODAY $NOW" ]; then
                echo "Already sent at this minute. Skip."
                exit 0
              fi

              echo ">>> Sending Telegram Message..."

              curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
                -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                -d text="[$NOW] CLEC投資理財，CLEC James老師說：股票，有錢就買，絕對不賣。"

              # 更新發送紀錄
              echo "$TODAY $NOW" > $LOCK_FILE
              ;;

            *)
              echo "No matching time. Skip."
              ;;
          esac
