name: CLEC Telegram Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '32 0 * * *'   # 08:32 GMT+8
    - cron: '58 0 * * *'   # 08:58
    - cron: '30 1 * * *'   # 09:30
    - cron: '0 2 * * *'    # 10:00
    - cron: '40 3 * * *'   # 11:40
    - cron: '10 5 * * *'   # 13:10
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="CLEC投資理財，CLEC James老師說：股票，有錢就買，絕對不賣。"
``
